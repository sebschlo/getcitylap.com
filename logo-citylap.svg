<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background plate -->
  <rect x="8" y="8" width="112" height="112" rx="32" fill="url(#bg)"/>

  <!-- Skyline removed for app-icon clarity -->

  <!-- Pin cluster
       Main placement/size control: transform translate(64 50) scale(1.5) -->
  <g transform="translate(64 50) scale(1.5) translate(-64 -44)">
    <!-- Left translucent pin (rotated inward).
         Rotation pivot: (44, 45.8) | Increase angle to tilt more toward center. -->
    <g transform="rotate(-15 44 45.8)">
      <path d="M28 45.5C28 36.3873 35.1634 29 44 29C52.8366 29 60 36.3873 60 45.5C60 60.2515 44 72.2 44 72.2C44 72.2 28 60.2515 28 45.5Z" fill="url(#pinLeft)" fill-opacity="0.84"/>
      <circle cx="44" cy="45.8" r="9.5" fill="#FFFFFF" fill-opacity="0.5"/>
    </g>

    <!-- Right translucent pin (rotated inward).
         Rotation pivot: (84, 45.8) | Increase absolute angle to tilt more toward center. -->
    <g transform="rotate(15 84 45.8)">
      <path d="M68 45.5C68 36.3873 75.1634 29 84 29C92.8366 29 100 36.3873 100 45.5C100 60.2515 84 72.2 84 72.2C84 72.2 68 60.2515 68 45.5Z" fill="url(#pinRight)" fill-opacity="0.84"/>
      <circle cx="84" cy="45.8" r="9.5" fill="#FFFFFF" fill-opacity="0.5"/>
    </g>

    <!-- Center pin -->
    <g>
      <!-- Tip sits near x=64, y=70.8 -->
      <path d="M45 42.5C45 32.835 53.5066 25 64 25C74.4934 25 83 32.835 83 42.5C83 58.0997 64 70.8 64 70.8C64 70.8 45 58.0997 45 42.5Z" fill="url(#pinCenter)"/>
      <!-- Inner badge circle -->
      <circle cx="64" cy="43.3" r="11.3" fill="#111821" fill-opacity="0.58"/>
      <!-- Full-edge crosshairs (drawn above gray badge, below C/L glyph) -->
      <path d="M64.2 8V120M8 43.3H120" stroke="white" stroke-opacity="0.86" stroke-width="1.9" stroke-linecap="round"/>
      <!-- Stylized C -->
      <path d="M70.8 37.8C69.3 36.1 66.9 35 64.2 35C59.5 35 55.8 38.7 55.8 43.3C55.8 47.9 59.5 51.6 64.2 51.6C66.9 51.6 69.3 50.5 70.8 48.8" stroke="white" stroke-width="3.1" stroke-linecap="round"/>
      <!-- Stylized L (vertex aligned to crosshair center at 64.2,43.3) -->
      <path d="M64.2 36.3V43.3H70.4" stroke="white" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Palette -->
  <defs>
    <linearGradient id="bg" x1="24" y1="18" x2="110" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6EE"/>
      <stop offset="1" stop-color="#E9F5F6"/>
    </linearGradient>
    <linearGradient id="pinLeft" x1="36" y1="34" x2="58" y2="66" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EB8D8"/>
      <stop offset="1" stop-color="#8CCEA4"/>
    </linearGradient>
    <linearGradient id="pinRight" x1="71" y1="34" x2="93" y2="66" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2A87D"/>
      <stop offset="1" stop-color="#D88EC6"/>
    </linearGradient>
    <linearGradient id="pinCenter" x1="50" y1="28" x2="75" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#66C6CF"/>
      <stop offset="1" stop-color="#F2A87D"/>
    </linearGradient>
  </defs>
</svg>
